name: Microservices CI Pipeline

on:
  push:
    branches:
      - main

env:
  IMAGE_TAG: v${{ github.run_number }}

jobs:
  ci:
    name: Code Quality + Testing
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install Dependencies
        run: |
          pip install -r user-service/requirements.txt
          pip install -r order-service/requirements.txt

      - name: Lint Check
        run: |
          pip install flake8
          flake8 . || true

      - name: Run Unit Tests
        run: |
          echo "Run unit tests here"
          # pytest

  docker-build-push:
    name: Build + Push Docker Images
    runs-on: ubuntu-latest
    needs: ci

    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        run: |
          echo "${{ secrets.DOCKER_PASSWORD }}" | \
          docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

      # USER SERVICE
      - name: Build User Service Image
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/user-service:${{ env.IMAGE_TAG }} ./user-service

      - name: Push User Service Image
        run: |
          docker push ${{ secrets.DOCKER_USERNAME }}/user-service:${{ env.IMAGE_TAG }}

      # ORDER SERVICE
      - name: Build Order Service Image
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/order-service:${{ env.IMAGE_TAG }} ./order-service

      - name: Push Order Service Image
        run: |
          docker push ${{ secrets.DOCKER_USERNAME }}/order-service:${{ env.IMAGE_TAG }}

      # API GATEWAY
      - name: Build API Gateway Image
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/api-gateway:${{ env.IMAGE_TAG }} ./api-gateway

      - name: Push API Gateway Image
        run: |
          docker push ${{ secrets.DOCKER_USERNAME }}/api-gateway:${{ env.IMAGE_TAG }}
