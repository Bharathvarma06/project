name: Full Microservices CI/CD Pipeline

on:
  push:
    branches:
      - main

jobs:
  ci-cd:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      # =========================
      # INSTALL DEPENDENCIES
      # =========================
      - name: Install User Service Dependencies
        run: |
          cd user-service
          pip install -r requirements.txt

      - name: Install API Gateway Dependencies
        run: |
          cd api-gateway
          pip install -r requirements.txt

      - name: Install Frontend Dependencies
        run: |
          cd frontend
          npm install

      # =========================
      # CODE QUALITY CHECK
      # =========================
      - name: Install Lint Tools
        run: |
          pip install flake8

      - name: Run Code Quality Check
        run: |
          flake8 user-service --exclude=venv,__pycache__ || true
          flake8 api-gateway --exclude=venv,__pycache__ || true

      # =========================
      # UNIT TESTS
      # =========================
      - name: Install Test Dependencies
        run: |
          pip install pytest

      - name: Run Unit Tests
        run: |
          pytest user-service || true
          pytest api-gateway || true

      # =========================
      # FRONTEND BUILD TEST
      # =========================
      - name: Frontend Build Validation
        run: |
          cd frontend
          npm run build

      # =========================
      # DOCKER SETUP
      # =========================
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # =========================
      # BUILD + PUSH IMAGES
      # =========================
      - name: Build and Push User Service Image
        uses: docker/build-push-action@v5
        with:
          context: ./user-service
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/user-service:${{ github.run_number }}
            ${{ secrets.DOCKER_USERNAME }}/user-service:latest

      - name: Build and Push API Gateway Image
        uses: docker/build-push-action@v5
        with:
          context: ./api-gateway
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/api-gateway:${{ github.run_number }}
            ${{ secrets.DOCKER_USERNAME }}/api-gateway:latest

      - name: Build and Push Order Service Image
        uses: docker/build-push-action@v5
        with:
          context: ./order-service
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/order-service:${{ github.run_number }}
            ${{ secrets.DOCKER_USERNAME }}/order-service:latest

      - name: Build and Push Frontend Image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/frontend:${{ github.run_number }}
            ${{ secrets.DOCKER_USERNAME }}/frontend:latest
